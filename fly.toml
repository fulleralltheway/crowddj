app = "crowddj-socket"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.socket"

[env]
  PORT = "3001"
  VERCEL_URL = "https://crowddj.vercel.app"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
